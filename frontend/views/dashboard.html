<div id="view-dashboard" class="app-view">
    <div class="hud-grid" style="grid-template-columns: repeat(3, 1fr)">
        <div class="hud-card">
            <div class="card-header">
                <span class="card-title">Active Warrants</span>
                <i class="fas fa-file-signature card-icon"></i>
            </div>
            <div class="stat-value">14</div>
            <div class="stat-diff diff-up"><i class="fas fa-caret-up"></i> +2 since yesterday</div>
        </div>
        <div class="hud-card">
            <div class="card-header">
                <span class="card-title">Officers on Duty</span>
                <i class="fas fa-user-shield card-icon"></i>
            </div>
            <div class="stat-value">8</div>
            <div class="stat-diff diff-up"><i class="fas fa-caret-up"></i> +1 this shift</div>
        </div>
        <div class="hud-card">
            <div class="card-header">
                <span class="card-title">Wanted Vehicles</span>
                <i class="fas fa-car card-icon"></i>
            </div>
            <div class="stat-value">27</div>
            <div class="stat-diff diff-down"><i class="fas fa-caret-down"></i> -3 resolved</div>
        </div>
        <div class="hud-card">
            <div class="card-header">
                <span class="card-title">Open Investigations</span>
                <i class="fas fa-search card-icon"></i>
            </div>
            <div class="stat-value">112</div>
            <div class="stat-diff diff-up"><i class="fas fa-caret-up"></i> +5 new cases</div>
        </div>
        <div class="hud-card">
            <div class="card-header">
                <span class="card-title">Pending Reports</span>
                <i class="fas fa-exclamation-triangle card-icon"></i>
            </div>
            <div class="stat-value">42</div>
            <div class="stat-diff diff-down"><i class="fas fa-caret-down"></i> -4 today</div>
        </div>
        <div class="hud-card">
            <div class="card-header">
                <span class="card-title">Paperwork Filed</span>
                <i class="fas fa-file-alt card-icon"></i>
            </div>
            <div class="stat-value">856</div>
            <div class="stat-diff diff-up"><i class="fas fa-caret-up"></i> +8% month-to-date</div>
        </div>
    </div>
    <div class="hud-card" style="margin-top:2rem">
        <div class="card-header">
            <span class="card-title">Recent Intelligence Announcements</span>
        </div>
        <div id="announcement-list">
            <!-- Populated by JS -->
        </div>
    </div>
</div>
